name: Publish mod release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub release tag to publish
        required: true
        type: string
      publish_neoforge:
        description: Publish NeoForge 1.21.1
        required: true
        default: true
        type: boolean
      publish_forge:
        description: Publish Forge 1.20.1
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-mod-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-neoforge:
    if: github.event_name == 'release' || inputs.publish_neoforge
    runs-on: ubuntu-latest
    steps:
      - name: Check out the released NeoForge source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify version and build NeoForge 1.21.1
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          actual_version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          test "$actual_version" = "$RELEASE_TAG"
          chmod +x gradlew
          ./gradlew build --no-daemon --no-configuration-cache
          test -f "build/libs/rtsbuilding-neoforge-1.21.1-${RELEASE_TAG}.jar"

      - name: Load release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body > release-notes.md

      - name: Publish NeoForge 1.21.1
        uses: Kira-NT/mc-publish@52307b03863581dec6b652b83e597aec02ebb075
        with:
          modrinth-id: 5PkY7RJI
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: 1553142
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/rtsbuilding-neoforge-1.21.1-${{ github.event.release.tag_name || inputs.tag }}.jar
          name: RTS Building ${{ github.event.release.tag_name || inputs.tag }} for NeoForge 1.21.1
          version: ${{ github.event.release.tag_name || inputs.tag }}
          version-type: beta
          changelog-file: release-notes.md
          loaders: neoforge
          game-versions: 1.21.1
          game-version-filter: none
          environment: client | server
          java: 21
          retry-attempts: 3
          retry-delay: 10000

  publish-forge:
    if: github.event_name == 'release' || inputs.publish_forge
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Forge maintenance line
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: forge-1.20.1

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify version and build Forge 1.20.1
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          actual_version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          test "$actual_version" = "$RELEASE_TAG"
          chmod +x gradlew
          ./gradlew build --no-daemon --no-configuration-cache
          test -f "build/libs/rtsbuilding-forge-1.20.1-${RELEASE_TAG}.jar"

      - name: Load release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body > release-notes.md

      - name: Publish Forge 1.20.1
        uses: Kira-NT/mc-publish@52307b03863581dec6b652b83e597aec02ebb075
        with:
          modrinth-id: 5PkY7RJI
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: 1553142
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/rtsbuilding-forge-1.20.1-${{ github.event.release.tag_name || inputs.tag }}.jar
          name: RTS Building ${{ github.event.release.tag_name || inputs.tag }} for Forge 1.20.1
          version: ${{ github.event.release.tag_name || inputs.tag }}
          version-type: beta
          changelog-file: release-notes.md
          loaders: forge
          game-versions: 1.20.1
          game-version-filter: none
          environment: client | server
          java: 21
          retry-attempts: 3
          retry-delay: 10000
